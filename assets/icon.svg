<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- tile background: deep charcoal with a soft top light -->
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"    stop-color="#333a42"/>
      <stop offset="0.55" stop-color="#20252b"/>
      <stop offset="1"    stop-color="#12151a"/>
    </linearGradient>
    <!-- faint green glow behind the pod so the color pops off the dark tile -->
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0"   stop-color="#3fb950" stop-opacity="0.28"/>
      <stop offset="0.6" stop-color="#3fb950" stop-opacity="0.08"/>
      <stop offset="1"   stop-color="#3fb950" stop-opacity="0"/>
    </radialGradient>
    <!-- vignette to seat the artwork -->
    <radialGradient id="vig" cx="0.5" cy="0.46" r="0.72">
      <stop offset="0.6" stop-color="#000000" stop-opacity="0"/>
      <stop offset="1"   stop-color="#000000" stop-opacity="0.30"/>
    </radialGradient>

    <!-- pod: front (near) wall, bright and lit from upper-left -->
    <linearGradient id="podFront" x1="0" y1="0" x2="0.35" y2="1">
      <stop offset="0" stop-color="#54c765"/>
      <stop offset="1" stop-color="#2f9f45"/>
    </linearGradient>
    <!-- pod: back (far) wall, darker so it reads as depth behind the peas -->
    <linearGradient id="podBack" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2c8f3f"/>
      <stop offset="1" stop-color="#217e34"/>
    </linearGradient>
    <!-- specular streak along the top rim of the pod -->
    <linearGradient id="rim" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#8ce49a" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#8ce49a" stop-opacity="0"/>
    </linearGradient>
    <!-- sprout leaf -->
    <linearGradient id="leaf" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#3fb950"/>
      <stop offset="1" stop-color="#67e076"/>
    </linearGradient>

    <!-- pea body: soft, dimensional, lit upper-left -->
    <radialGradient id="pea" cx="0.36" cy="0.30" r="0.85">
      <stop offset="0"    stop-color="#f4fff2"/>
      <stop offset="0.55" stop-color="#d3f8d6"/>
      <stop offset="1"    stop-color="#9fe8a8"/>
    </radialGradient>
    <!-- tiny specular hotspot on each pea -->
    <radialGradient id="hot" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>

    <!-- drop shadow to lift the whole cluster off the tile -->
    <filter id="cast" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#000000" flood-opacity="0.42"/>
    </filter>
    <!-- soft contact-occlusion where peas sit in the pod -->
    <filter id="blurAO" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="5"/>
    </filter>

    <clipPath id="tile">
      <rect x="0" y="0" width="512" height="512" rx="115"/>
    </clipPath>
  </defs>

  <!-- app tile -->
  <rect x="0" y="0" width="512" height="512" rx="115" fill="url(#bg)"/>
  <g clip-path="url(#tile)">
    <rect x="0" y="0" width="512" height="512" fill="url(#glow)"/>
    <rect x="0" y="0" width="512" height="512" fill="url(#vig)"/>
  </g>

  <!-- pod + peas, tilted for a dynamic look -->
  <g transform="translate(252,262) rotate(-33)" filter="url(#cast)">

    <!-- sprout leaf at the top tip (drawn behind pod join) -->
    <g transform="translate(166,2)">
      <path d="M 6,-2 C 54,-20 82,-52 74,-94 C 36,-80 10,-50 2,-6 Z"
            fill="url(#leaf)" stroke="#1a7f37" stroke-width="5.5" stroke-linejoin="round"/>
      <path d="M 14,-16 C 36,-38 52,-58 62,-78" fill="none"
            stroke="#1a7f37" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
    </g>

    <!-- full pod silhouette (this is the far / back wall) -->
    <path d="M -170,0 C -66,-90 66,-90 170,0 C 66,90 -66,90 -170,0 Z"
          fill="url(#podBack)" stroke="#166e30" stroke-width="6"/>
    <!-- bright rim highlight along the top edge -->
    <path d="M -150,-6 C -60,-78 60,-78 150,-6 C 90,-40 -90,-40 -150,-6 Z"
          fill="url(#rim)" opacity="0.85"/>

    <!-- soft shadow the peas cast down into the pod -->
    <g filter="url(#blurAO)" opacity="0.35">
      <ellipse cx="-84" cy="16" rx="40" ry="16" fill="#0d5222"/>
      <ellipse cx="2"   cy="18" rx="44" ry="17" fill="#0d5222"/>
      <ellipse cx="88"  cy="16" rx="40" ry="16" fill="#0d5222"/>
    </g>

    <!-- three peas -->
    <g>
      <circle cx="-84" cy="-4" r="43" fill="url(#pea)" stroke="#1f8b39" stroke-width="3.5"/>
      <circle cx="2"   cy="-6" r="47" fill="url(#pea)" stroke="#1f8b39" stroke-width="3.5"/>
      <circle cx="88"  cy="-4" r="43" fill="url(#pea)" stroke="#1f8b39" stroke-width="3.5"/>
      <!-- specular hotspots (consistent upper-left light) -->
      <ellipse cx="-98" cy="-22" rx="15" ry="11" fill="url(#hot)"/>
      <ellipse cx="-13" cy="-26" rx="17" ry="12" fill="url(#hot)"/>
      <ellipse cx="73"  cy="-22" rx="15" ry="11" fill="url(#hot)"/>
    </g>

    <!-- front (near) wall of the pod, curling over the bottom of the peas -->
    <path d="M -170,0 C -66,90 66,90 170,0 C 70,44 -70,44 -170,0 Z"
          fill="url(#podFront)" stroke="#166e30" stroke-width="6" stroke-linejoin="round"/>
    <!-- glossy sheen on the front wall -->
    <path d="M -150,8 C -60,54 60,54 150,8 C 70,30 -70,30 -150,8 Z"
          fill="#ffffff" opacity="0.12"/>
  </g>
</svg>
